name: SpiriCom CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend deps
        run: pip install -r requirements.txt

      - name: Lint backend (flake8)
        run: pip install flake8 && flake8 src/ --max-line-length=120 --extend-ignore=E203 || true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend deps
        run: cd compspirit && npm ci

      - name: Build frontend
        run: cd compspirit && npm run build

  docker-build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:latest

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./compspirit
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:latest

  # ── NEW: déclenche le déploiement Render ─────────────────────────
  deploy-backend:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            --fail \
            --silent \
            --show-error
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}

  # ── NEW: vérifie que le backend est vivant après déploiement ──────
  health-check:
    needs: deploy-backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Wait for Render to wake up
        run: sleep 30

      - name: Health check
        run: |
          curl -f "${{ secrets.RENDER_URL }}/health" \
            --retry 5 \
            --retry-delay 10 \
            --retry-connrefused
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}