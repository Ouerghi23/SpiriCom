name: SpiriComp CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  backend:
    name: 🐍 Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Create __init__.py files
        run: |
          find src -type d -exec touch {}/__init__.py \;

      - name: Install backend dependencies
        run: |
          pip install --upgrade pip
          pip install \
              "pandas>=2.0.0" \
              "numpy>=1.24.0" \
              "pyarrow>=14.0.0" \
              "scikit-learn>=1.3.0" \
              "xgboost>=2.0.0" \
              "statsmodels>=0.14.0" \
              "fastapi>=0.110.0" \
              "uvicorn[standard]>=0.29.0" \
              "pydantic>=2.0.0" \
              "python-multipart>=0.0.9" \
              "sqlalchemy>=2.0.0" \
              "python-jose[cryptography]>=3.3.0" \
              "passlib[bcrypt]>=1.7.4" \
              "loguru>=0.7.0" \
              "python-dotenv>=1.0.0" \
              "PyYAML>=6.0.0" \
              "joblib>=1.3.0" \
              "httpx>=0.27.0" \
              "requests>=2.31.0" \
              "pytest>=8.0.0" \
              "pytest-cov>=4.1.0"

      - name: Create required directories
        run: mkdir -p data/nlp data/processed models/nlp models/anomaly models/prediction models/clustering

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

      - name: Test Python imports
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          try:
              from src.nlp.multilingual_nlp_pipeline import MultilingualNLPPipeline
              print('✓ MultilingualNLPPipeline imported')
          except Exception as e:
              print('✗ Failed to import MultilingualNLPPipeline:', e)
              exit(1)
          try:
              from src.api.ai_api import get_ai_response
              print('✓ AI API imported')
          except Exception as e:
              print('✗ Failed to import AI API:', e)
              exit(1)
          try:
              from src.nlp.complaint_db import ComplaintDB
              print('✓ ComplaintDB imported')
          except Exception as e:
              print('✗ Failed to import ComplaintDB:', e)
              exit(1)
          print('✅ All imports successful')
          "

      - name: NLP self-test
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from src.nlp.multilingual_nlp_pipeline import MultilingualNLPPipeline
          pipeline = MultilingualNLPPipeline()
          result = pipeline.process('Test complaint in English')
          print('✓ NLP pipeline test successful')
          "

      - name: Seed database
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from src.nlp.seed_db import main
          main(count=10)
          print('✓ Database seeded successfully')
          "
        continue-on-error: true

      - name: Train NLP model
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from src.mlops.train_nlp import train_model
          train_model()
          print('✓ NLP model trained successfully')
          "
        continue-on-error: true

      - name: Database initialization test
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from src.nlp.complaint_db import ComplaintDB
          db = ComplaintDB()
          count = db.count()
          print(f'✅ Database OK — {count} rows')
          "

      - name: FastAPI import test
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from src.nlp.analytics_api import app
          print(f'✅ FastAPI OK — {len(app.routes)} routes')
          "

      - name: NLP routes test
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from src.nlp.nlp_api import router
          paths = [getattr(r, 'path', '') for r in router.routes]
          assert '/api/complaints/submit' in paths, 'Submit route missing'
          assert '/api/complaints' in paths, 'Complaints route missing'
          print('✅ NLP routes OK')
          "

      - name: Run pytest
        run: |
          python -m pytest src/tests/ -v --tb=short --cov=src --cov-report=term-missing || true
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Security check
        run: |
          pip install pip-audit
          pip-audit --skip-editable || true

  frontend:
    name: ⚛️ React build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: compspirit/package-lock.json

      - name: Clean install and fix dependencies
        working-directory: ./compspirit
        run: |
          # Remove everything for clean install
          rm -rf node_modules package-lock.json
          
          # Install with legacy peer deps
          npm install --legacy-peer-deps
          
          # Force install missing dependencies
          npm install --save-dev \
            browserslist@latest \
            caniuse-lite@latest \
            node-releases@latest \
            autoprefixer@latest \
            postcss@latest \
            --legacy-peer-deps
          
          # Update browserslist database
          npx update-browserslist-db@latest
          
          # Verify installation
          npm list browserslist node-releases autoprefixer postcss

      - name: Build React app
        working-directory: ./compspirit
        run: |
          # Ensure vite is executable
          chmod +x node_modules/.bin/vite
          
          # Build the app
          npx vite build
        env:
          VITE_API_URL: http://localhost:8000

      - name: Show build size
        working-directory: ./compspirit
        run: |
          echo "📦 Build size:"
          du -sh dist/
          echo "📁 Files:"
          find dist -type f -name "*.js" -exec ls -lh {} \; | awk '{print $9, $5}'

      - name: Security audit
        working-directory: ./compspirit
        run: |
          npm audit --audit-level=high || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: compspirit/dist
          retention-days: 7

  deploy-frontend:
    name: 🚀 Deploy to Vercel
    needs: frontend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel

      - name: Deploy to Vercel
        run: vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        working-directory: ./compspirit

  deploy-backend:
    name: 🚀 Deploy Backend
    needs: backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
              fastapi uvicorn[standard] \
              pandas numpy scikit-learn \
              requests httpx \
              python-dotenv

      - name: Start FastAPI server
        run: |
          nohup uvicorn src.nlp.analytics_api:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -s http://localhost:8000/docs || echo "Server starting..."
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Health check
        run: |
          curl -f http://localhost:8000/health || echo "Health check pending"