# .github/workflows/ci.yml
# ─────────────────────────────────────────────────────────────────────
# SpiriComp — Continuous Integration
#
# Triggers:
#   - Every push to main or develop
#   - Every Pull Request targeting main
#
# Jobs:
#   1. backend  — Python lint + NLP self-test + FastAPI startup check
#   2. frontend — npm install + ESLint + Vite build
# ─────────────────────────────────────────────────────────────────────

name: SpiriComp CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ═══════════════════════════════════════════════════════════════════════
# JOB 1 — BACKEND
# ═══════════════════════════════════════════════════════════════════════
jobs:
  backend:
    name: 🐍 Backend — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      # ── Checkout ──────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Python setup ──────────────────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # ── Dependencies ──────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Lint with ruff (fast Python linter) ───────────────────────
      # Install ruff if not in requirements.txt
      - name: Install ruff
        run: pip install ruff

      - name: Lint — ruff check
        run: ruff check src/ --ignore E501,E402
        # E501 = line too long (not critical)
        # E402 = module import not at top (sys.path.insert pattern)

      # ── Create required data directories ──────────────────────────
      # The NLP pipeline and DB need these folders to exist
      - name: Create data directories
        run: |
          mkdir -p data/nlp
          mkdir -p data/processed
          mkdir -p models/nlp
          mkdir -p models/anomaly
          mkdir -p models/prediction
          mkdir -p models/clustering

      # ── NLP self-test ─────────────────────────────────────────────
      - name: Run NLP pipeline self-test
        run: python src/nlp/multilingual_nlp_pipeline.py
        # Runs the built-in __main__ test block:
        # tests 9 sentences in AR/FR/EN — must pass 9/9

      # ── ComplaintDB schema init ────────────────────────────────────
      - name: Test SQLite DB initialization
        run: |
          python -c "
          from src.nlp.complaint_db import ComplaintDB
          db = ComplaintDB()
          count = db.count()
          print(f'DB init OK — {count} rows')
          "

      # ── FastAPI import check ───────────────────────────────────────
      # Verifies analytics_api.py can be imported without errors
      - name: Test FastAPI app import
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from src.api.analytics_api import app
          routes = [r.path for r in app.routes]
          print('Routes registered:', len(routes))
          # Check critical routes exist
          assert any('/api/analytics/overview' in r for r in routes), 'Missing /api/analytics/overview'
          print('FastAPI import check PASSED')
          "

      # ── NLP API routes check ───────────────────────────────────────
      - name: Test NLP API routes
        run: |
          python -c "
          from src.nlp.nlp_api import router
          paths = [r.path for r in router.routes]
          print('NLP routes:', paths)
          assert '/api/complaints/submit' in paths, 'Missing /api/complaints/submit'
          assert '/api/complaints'        in paths, 'Missing /api/complaints'
          assert '/api/complaints/stats'  in paths, 'Missing /api/complaints/stats'
          print('NLP routes check PASSED')
          "

  # ═══════════════════════════════════════════════════════════════════
  # JOB 2 — FRONTEND
  # ═══════════════════════════════════════════════════════════════════
  frontend:
    name: ⚛️  Frontend — Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['20']

    steps:
      # ── Checkout ──────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Node setup ────────────────────────────────────────────────
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # ── Install ───────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── Lint ──────────────────────────────────────────────────────
      - name: ESLint check
        run: npx eslint src/ --ext .js,.jsx --max-warnings 20
        continue-on-error: true
        # continue-on-error: won't fail the build on lint warnings

      # ── Vite build ────────────────────────────────────────────────
      # Verifies the production bundle compiles without errors
      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000

      # ── Build artifact size report ────────────────────────────────
      - name: Report build size
        run: |
          echo "Build output:"
          du -sh dist/
          ls -lh dist/assets/ | head -20