# .github/workflows/ci.yml
# FIX: utilise requirements-ci.txt (léger) au lieu de requirements.txt
# (tensorflow + mlflow + ydata-profiling cassent le CI)

name: SpiriComp CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ═══════════════════════════════════════════════════════════════════
  # JOB 1 — BACKEND
  # ═══════════════════════════════════════════════════════════════════
  backend:
    name: 🐍 Backend — Python 3.11
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      # ── Installe uniquement les dépendances backend (2 min max) ──
      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      # ── Créer les dossiers requis ──────────────────────────────────
      - name: Create data directories
        run: |
          mkdir -p data/nlp data/processed
          mkdir -p models/nlp models/anomaly models/prediction models/clustering

      # ── NLP self-test (9 phrases AR/FR/EN) ───────────────────────
      - name: Run NLP pipeline self-test
        run: python src/nlp/multilingual_nlp_pipeline.py

      # ── DB init ───────────────────────────────────────────────────
      - name: Test SQLite DB initialization
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from src.nlp.complaint_db import ComplaintDB
          db = ComplaintDB()
          print(f'DB OK — {db.count()} rows')
          "

      # ── FastAPI import ─────────────────────────────────────────────
      - name: Test FastAPI app import
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from src.api.analytics_api import app
          routes = [getattr(r, 'path', '') for r in app.routes]
          print(f'Routes registered: {len(routes)}')
          assert any('analytics' in r for r in routes)
          print('FastAPI import PASSED')
          "

      # ── NLP routes ────────────────────────────────────────────────
      - name: Test NLP API routes
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from src.nlp.nlp_api import router
          paths = [getattr(r, 'path', '') for r in router.routes]
          print('NLP routes:', paths)
          assert '/api/complaints/submit' in paths
          assert '/api/complaints'        in paths
          assert '/api/complaints/stats'  in paths
          print('NLP routes PASSED')
          "

  # ═══════════════════════════════════════════════════════════════════
  # JOB 2 — FRONTEND (compspirit/)
  # ═══════════════════════════════════════════════════════════════════
  frontend:
    name: ⚛️  Frontend — Node 20
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./compspirit

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: compspirit/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: ESLint check
        run: npx eslint src/ --ext .js,.jsx --max-warnings 30
        continue-on-error: true

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000

      - name: Report build size
        run: du -sh dist/